name: Smoke Tests

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - run: npm ci

      - run: npx playwright install --with-deps

      - run: npx playwright test --grep @smoke